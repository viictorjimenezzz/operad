input:
  - name: "context"
    type: "str"
    system: true
    description: "The assistant's identity profile — persona, expertise, tone, audience, and behavioral constraints."
    optional: true

  - name: "interaction_context"
    type: "str"
    system: true
    description: "Schema descriptions for InteractionContext fields (excluding message) — consult for field semantics."

  - name: "session_context"
    type: "str"
    system: true
    description: "Schema descriptions for SessionContext fields — consult for field semantics."

  - name: "workspace_guide"
    type: "str"
    system: true
    description: "Concise overview of the knowledge base content — major themes, topic areas, and types of information available. Used to assess whether the user's question falls within scope of retrievable content."
    optional: true

  - name: "user_information"
    type: "str"
    system: true
    description: "Structured information about the user extracted from previous interactions (n-1). Organised into semantic namespaces: user background, communication preferences, goals and intents, task context, constraints, and interaction state."
    optional: true

  - name: "beliefs_json"
    type: "str"
    system: false
    description: "JSON array of active structured beliefs: [{topic_key, claim_text, salience_score}, ...]."
    optional: true

  - name: "belief_summary"
    type: "str"
    system: false
    description: "Narrative digest of all claims the assistant has shared with the user across the conversation."
    optional: true

  - name: "chat_history"
    type: "str"
    system: false
    description: "Previous user–assistant interactions as a single string."

  - name: "user_message"
    type: "str"
    system: false
    description: "The latest message from the user."

output:
  - name: "scratchpad"
    type: "str"
    system: false
    description: "Chain-of-thought: which beliefs overlap, what pattern this is, route reasoning, and how downstream_message should differ from rewritten_message."

  - name: "rewritten_message"
    type: "str"
    system: false
    description: "Standalone, reference-resolved version of the user's message preserving full intent."

  - name: "route"
    type: "str"
    system: false
    description: "RAG_NEEDED or DIRECT_ANSWER."

  - name: "route_reasoning"
    type: "str"
    system: false
    description: "Brief explanation of the routing decision, referencing belief coverage."

  - name: "downstream_message"
    type: "str"
    system: false
    description: "Operational message for the chosen path: search-optimized when RAG_NEEDED, equals rewritten_message when DIRECT_ANSWER."
